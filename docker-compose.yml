services:
  postgres:
    image: postgres:16-alpine
    container_name: eop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eop}
      POSTGRES_DB: ${POSTGRES_DB:-eop}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-eop} -d ${POSTGRES_DB:-eop}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eop-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Application services. Kept under the `full` profile so `docker compose up`
  # (no profile) brings up only infra for local `pnpm dev`.
  api:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: eop-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-eop}:${POSTGRES_PASSWORD:-eop}@postgres:5432/${POSTGRES_DB:-eop}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-cookie}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
    ports:
      - '4000:4000'

  web:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: eop-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:80'

volumes:
  postgres_data:
  redis_data:
